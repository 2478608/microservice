version: "3.9"

services:

  api-gateway:
    container_name: api-gateway
    build:
      context: ./services/ApiGateway
    ports:
      - "8080:8080"
    depends_on:
      - order-service
      - product-service

  product-service:
    container_name: product-service
    build:
      context: ./services/ProductService/ProductService.API
    ports:
      - "5035:5035"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker

  order-service:
    container_name: order-service
    build:
      context: ./services/OrderService/OrderService.API
    ports:
      - "5127:5127"
    depends_on:
      - product-service
    environment:
      ASPNETCORE_ENVIRONMENT: Docker

